<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 44" role="img" aria-label="DJC Point of Sale">

  <!-- Shopping bag handles -->
  <path d="M13,18 Q13,9 20,9 Q27,9 27,18" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Shopping bag body -->
  <path d="M8,18 L11,40 L29,40 L32,18 Z" fill="rgba(255,255,255,0.18)" stroke="white" stroke-width="1.8"/>

  <!-- Price tag circle on bag -->
  <circle cx="20" cy="29" r="6" fill="rgba(255,255,255,0.22)" stroke="white" stroke-width="1.4"/>

  <!-- Currency symbol (₱ using P + lines) -->
  <text x="20" y="33"
        font-family="Inter,'Helvetica Neue',Arial,sans-serif"
        font-size="9" font-weight="700" fill="white"
        text-anchor="middle">₱</text>

  <!-- DJC brand name -->
  <text x="48" y="28"
        font-family="Inter,'Helvetica Neue',Arial,sans-serif"
        font-size="22" font-weight="800" fill="white" letter-spacing="2">DJC</text>

  <!-- Point of Sale subtitle -->
  <text x="49" y="40"
        font-family="Inter,'Helvetica Neue',Arial,sans-serif"
        font-size="8.5" font-weight="400" fill="rgba(255,255,255,0.78)" letter-spacing="2.5">Point of Sale</text>
</svg>

